<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6c63ff, #3f3d56);
            color: #333;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #f0f0f0;
            margin-bottom: 15px;
        }
        h1 {
            margin: 10px 0 5px;
            font-size: 1.8rem;
        }
        .title {
            color: #6c63ff;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }
        p {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 25px;
        }
        
        /* --- NEW BUTTON STYLES --- */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 10px; /* Space between buttons */
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        /* The Main Action Button */
        .btn-primary {
            background: #6c63ff;
            color: white;
            border: 2px solid #6c63ff;
        }
        .btn-primary:hover {
            background: #5149d1;
            border-color: #5149d1;
        }

        /* The New Home Button (Outline Style) */
        .btn-secondary {
            background: transparent;
            color: #6c63ff;
            border: 2px solid #6c63ff;
        }
        .btn-secondary:hover {
            background: #6c63ff;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="photo_2026-02-14_13-50-53.jpg" alt="Profile Picture" class="profile-pic">
        
        <h1>Heng Oudom</h1>
        <span class="title">Web Developer & Creator</span>
        
        <p>
            Hi there! I'm a passionate creator who loves building cool things with code. 
            When I'm not behind a screen, you'll probably find me exploring new coffee shops.
        </p>
        
        <div class="buttons-container">
            <a href="index.php" class="btn btn-secondary">Home</a>
        </div>
    </div>

</body>
</html>
