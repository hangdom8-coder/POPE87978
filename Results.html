<!DOCTYPE html>
<html>
<head>
    <title>Academic Results</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1e5bd8;
            color: white;
        }

        .navbar {
            background: #0d47a1;
            padding: 10px 20px;
        }

        .navbar button {
            background: #ffffff;
            border: none;
            padding: 8px 15px;
            color: rgb(0, 0, 0);
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            padding: 40px;
        }

        .card {
            background: #ffffff;
            color: black;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
        }

        .card h2 {
            text-align: center;
        }

        .student-name {
            text-align: center;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #1e5bd8;
            color: white;
            padding: 8px;
        }

        td {
            padding: 8px;
            text-align: center;
            border: 1px solid #ccc;
        }

        tr:nth-child(even) {
            background-color: #e0e0e0;
        }

        .result {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
        }

        .passed {
            color: #00e676;
            font-weight: bold;
        }

        .failed {
            color: red;
            font-weight: bold;
        }

        @media(max-width: 900px){
            .container{
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="navbar">

    <button> <a href="index.php"class="home-link">Home</a></button>
    
</div>

<div class="container" id="resultsContainer"></div>

<script>
    const semesters = [
        {
            title: "Year 1, Semester 1 (Term 1)",
            subjects: [
                {name: "Core English 1", score: 72},
                {name: "Critical Thinking", score: 82},
                {name: "Digital Literacy", score: 73},
                {name: "Economics", score: 79},
                {name: "Financial Literacy", score: 89}
            ]
        },
        {
            title: "Year 1, Semester 2 (Term 2)",
            subjects: [
                {name: "Core English 1", score: 72},
                {name: "Critical Thinking", score: 82},
                {name: "Digital Literacy", score: 73},
                {name: "Economics", score: 79},
                {name: "Financial Literacy", score: 89}
            ]
        },
        {
            title: "Year 2, Semester 1 (Term 1)",
            subjects: [
                {name: "Fundamental for Computer Technology", score: 78},
                {name: "Graphic Design", score: 77},
                {name: "Mathematics for Computing", score: 85},
                {name: "Presentation Skill", score: 61},
                {name: "Programming Methodology", score: 60}
            ]
        },
        {
            title: "Year 2, Semester 2 (Term 2)",
            subjects: [
                {name: "Core English 1", score: 72},
                {name: "Critical Thinking", score: 82},
                {name: "Digital Literacy", score: 73},
                {name: "Economics", score: 79},
                {name: "Financial Literacy", score: 89}
            ]
        }
    ];

    function getGrade(score) {
        if (score >= 90) return "A+";
        if (score >= 85) return "A";
        if (score >= 80) return "B+";
        if (score >= 70) return "B";
        if (score >= 60) return "C";
        return "F";
    }

    function createCard(semester) {
        let total = 0;

        let tableRows = semester.subjects.map(subject => {
            total += subject.score;
            return `
                <tr>
                    <td>${subject.name}</td>
                    <td>${subject.score}</td>
                    <td>${getGrade(subject.score)}</td>
                </tr>
            `;
        }).join("");

        let average = (total / semester.subjects.length).toFixed(1);
        let status = average >= 60 ? "Passed" : "Failed";
        let statusClass = average >= 60 ? "passed" : "failed";

        return `
            <div>
                <h3>${semester.title}</h3>
                <div class="card">
                    <h2>My Academic Results</h2>
                    <div class="student-name">Student Name: Heng Oudom</div>
                    <table>
                        <tr>
                            <th>Subject</th>
                            <th>Score</th>
                            <th>Grade</th>
                        </tr>
                        ${tableRows}
                    </table>
                    <div class="result">
                        Overall Average: ${average}% <br>
                        Status: <span class="${statusClass}">${status}</span>
                    </div>
                </div>
            </div>
        `;
    }

    const container = document.getElementById("resultsContainer");
    container.innerHTML = semesters.map(createCard).join("");
</script>

</body>
</html>
